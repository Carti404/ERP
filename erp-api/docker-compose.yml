# PostgreSQL local. Puerto en el host: 15433 (evita choque con otro servicio en 5433/5432).
#
# Arranque: docker compose up -d
# Parada:   docker compose down
#
# POSTGRES_HOST_AUTH_METHOD=trust → solo desarrollo local: no exige contraseña por red (evita 28P01
# en Windows cuando libpq/PG* o SCRAM se pelean con el cliente). NO uses esto en producción.
# Tras cambiar esto: docker compose down -v && docker compose up -d (reinicializa pg_hba).

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: erp
    ports:
      - "15433:5432"
    volumes:
      - erp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d erp']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  erp_pgdata:
